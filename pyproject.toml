[tool.ruff]
exclude = ['dockertest',
    'tests', 'docs', 'examples', 'scripts', 'setup.py', 'setup.cfg', 'README.md', 'LICENSE', 'MANIFEST.in',
    'pyproject.toml', 'Pipfile', 'Pipfile.lock', 'ruff.egg-info', 'dist', 'build', '.gitignore', '.git', '.idea',
    '.vscode', '.pytest_cache', '.coverage', '.ruff', '*/migrations/*']
line-length = 120

[tool.ruff.lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`)  codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
select = [
    "E",    # pycodestyle errors (instead of just E4, E7, E9)
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "Q",    # flake8-quotes
    "B",    # flake8-bugbear (finds common logical errors)
    "UP",   # pyupgrade (suggests modern Python syntax)
    "N",    # pep8-naming (checks proper naming of functions/classes)
    "PT",   # flake8-pytest-style (excellent for your pytest tests)
    "S",    # flake8-bandit (basic security checks)
    "C4",   # flake8-comprehensions (better list/dict comprehensions)
    "ARG",  # flake8-unused-arguments (finds unused function arguments)
#    "E4", "E7", "E9", "F", "I", "Q"
]
ignore = ["E731", "E722", "C408"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.per-file-ignores]
"*_test.py" = ["S101"]

[tool.ruff.format]

# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

[tool.ruff.lint.isort]
case-sensitive = false
lines-between-types = 1
combine-as-imports = true
order-by-type = false

[tool.coverage.run]
omit = ["demo/*", "demo/**/*", "demo.py", "test_*.py", "*_test.py"]
